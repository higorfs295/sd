syntax = "proto3";

package dfs.v1;

// =============================================================================
// MENSAGENS COMUNS (usadas por mais de um serviço)
// =============================================================================

// Identifica um nó do cluster.
message NodeRef {
  // ID lógico do nó. Ex.: "node1".
  string node_id = 1;

  // Endereço gRPC do nó.
  string host = 2;
  int32  port = 3;
}

// Resposta genérica para RPCs simples de sucesso/erro.
message Ack {
  bool   ok      = 1;
  string message = 2;  // Mensagem de sucesso ou erro.
}

// Status atribuído pelo coordenador com base nos heartbeats.
enum NodeStatus {
  NODE_STATUS_UNKNOWN = 0;  // Default.
  NODE_STATUS_ALIVE   = 1;  // Heartbeat recente.
  NODE_STATUS_SUSPECT = 2;  // Atrasado, mas não morto.
  NODE_STATUS_DEAD    = 3;  // Sem heartbeat há tempo suficiente.
}

// =============================================================================
// CONTROLSERVICE — plano de controle
// =============================================================================
//
// Coordena registro, heartbeat, autorização de upload/download e metadados.
// Não trafega bytes de usuário.
//
// =============================================================================

service ControlService {

  // Registro e supervisão de nós

  // Registra o nó no cluster.
  rpc RegisterNode (RegisterNodeRequest) returns (RegisterNodeResponse);

  // Heartbeat periódico com inventário dos chunks.
  rpc Heartbeat (HeartbeatRequest) returns (HeartbeatResponse);

  // Autorização de operações de dados

  // Inicia um upload e retorna o ingress.
  rpc RequestUpload (RequestUploadRequest) returns (RequestUploadResponse);

  // Confirma o upload e persiste os metadados.
  rpc ConfirmUpload (ConfirmUploadRequest) returns (Ack);

  // Inicia um download e retorna o egress.
  rpc RequestDownload (RequestDownloadRequest) returns (RequestDownloadResponse);

  // Operações de controle puras (sem bytes)

  // Remove o arquivo e apaga as réplicas.
  rpc DeleteFile (DeleteFileRequest) returns (Ack);

  // Lista arquivos conhecidos.
  rpc ListFiles (ListFilesRequest) returns (ListFilesResponse);
}

// ---------- Mensagens do ControlService ----------

message RegisterNodeRequest {
  // Nó e endereço de escuta.
  NodeRef node = 1;

  // Espaço livre em bytes.
  int64 free_space_bytes = 2;
}

message RegisterNodeResponse {
  bool   ok      = 1;
  string message = 2;

  // Parâmetros do cluster.
  int32 cluster_node_count       = 3;
  int32 replication_factor       = 4;
  int64 chunk_size_bytes         = 5;
  int32 heartbeat_interval_secs  = 6;
}

message HeartbeatRequest {
  // ID do nó que enviou o heartbeat.
  string node_id = 1;

  // Espaço livre atualizado.
  int64 free_space_bytes = 2;

  // Carga atual do nó.
  int32 active_uploads   = 3;
  int32 active_downloads = 4;

  // Block report com os chunks locais.
  repeated string chunk_ids = 5;
}

message HeartbeatResponse {
  bool ok = 1;

  // Chunks órfãos para apagar.
  repeated string chunks_to_delete = 2;
}

message RequestUploadRequest {
  // Caminho lógico do arquivo.
  string logical_path = 1;

  // Tamanho total do arquivo.
  int64 total_size_bytes = 2;

  // ID do cliente para deduplicação.
  string client_request_id = 3;
}

message RequestUploadResponse {
  bool   ok      = 1;
  string message = 2;

  // Token do upload.
  string upload_id = 3;

  // Nó ingress do arquivo.
  NodeRef ingress = 4;
}

message ChunkPlacement {
  // ID estável do chunk.
  string chunk_id = 1;

  // Índice do chunk no arquivo.
  int32 chunk_index = 2;

  // Tamanho efetivo do chunk.
  int64 size_bytes = 3;

  // Réplicas armazenadas.
  repeated NodeRef replicas = 4;
}

message ConfirmUploadRequest {
  // Liga a confirmação ao upload original.
  string upload_id = 1;

  // Chunks efetivamente armazenados.
  repeated ChunkPlacement chunks = 2;

  // Tamanho total gravado.
  int64 total_size_bytes = 3;
}

message RequestDownloadRequest {
  string logical_path = 1;
  string client_request_id = 2;  // Dedup do download.
}

message RequestDownloadResponse {
  bool   ok      = 1;
  string message = 2;

  // Token do download.
  string download_id = 3;

  // Nó egress do arquivo.
  NodeRef egress = 4;

  // Tamanho total esperado.
  int64 total_size_bytes = 5;
}

message DeleteFileRequest {
  string logical_path = 1;
}

message ListFilesRequest {
  // Reservado para filtros futuros.
}

message FileEntry {
  string logical_path     = 1;
  int64  total_size_bytes = 2;
  int32  chunk_count      = 3;

  // Nós que possuem ao menos um chunk.
  repeated string nodes_used = 4;
}

message ListFilesResponse {
  repeated FileEntry files = 1;
}

// =============================================================================
// DATASERVICE — plano de dados (interface com a CLI)
// =============================================================================
//
// Fica nos nós. A CLI só usa depois de consultar o coordenador.
// Tudo aqui é streaming para lidar com arquivos grandes.
//
// =============================================================================

service DataService {

  // PUT: a CLI envia UploadChunk e recebe UploadResult no fim.
  rpc UploadFile (stream UploadChunk) returns (UploadResult);

  // GET: a CLI envia DownloadStart e recebe DownloadChunk em sequência.
  rpc DownloadFile (DownloadStart) returns (stream DownloadChunk);
}

// ---------- Mensagens do DataService ----------

message UploadChunk {
  // Token de autorização do upload.
  string upload_id = 1;

  // Bytes do arquivo.
  bytes data = 2;
}

message UploadResult {
  bool   ok      = 1;
  string message = 2;

  // Resultado do upload e contagem final.
  int32 chunks_written = 3;
  int64 total_bytes_written = 4;
}

message DownloadStart {
  // Token de autorização do download.
  string download_id = 1;
}

message DownloadChunk {
  // Bytes do arquivo em ordem.
  bytes data = 1;

  // Marca opcional de último chunk.
  bool is_last = 2;
}

// =============================================================================
// REPLICATIONSERVICE — comunicação entre nós
// =============================================================================
//
// Usado entre nós e pelo coordenador para limpeza/diagnóstico.
//
// =============================================================================

service ReplicationService {

  // PUT da réplica: recebe um chunk e grava localmente.
  rpc StoreChunk (stream StoreChunkRequest) returns (StoreChunkResponse);

  // GET entre peers: envia um chunk específico.
  rpc FetchChunk (FetchChunkRequest) returns (stream FetchChunkResponse);

  // Apaga um chunk local.
  rpc DeleteChunk (DeleteChunkRequest) returns (Ack);

  // Lista os chunks locais.
  rpc ListChunks (ListChunksRequest) returns (ListChunksResponse);
}

// ---------- Mensagens do ReplicationService ----------

message StoreChunkRequest {
  // Primeira mensagem traz metadados; as demais, só bytes.

  string chunk_id    = 1;  // ID estável do chunk.
  int32  chunk_index = 2;  // Índice do chunk.
  string upload_id   = 3;  // Upload relacionado.
  string origin_node_id = 4;  // Nó de origem.

  // Bytes do chunk.
  bytes data = 5;
}

message StoreChunkResponse {
  bool   ok      = 1;
  string message = 2;

  // Total gravado.
  int64 bytes_written = 3;
}

message FetchChunkRequest {
  string chunk_id = 1;

  // Nó que fez a requisição.
  string origin_node_id = 2;
}

message FetchChunkResponse {
  // Bytes do chunk.
  bytes data = 1;
}

message DeleteChunkRequest {
  string chunk_id = 1;
}

message ListChunksRequest {
  // Reservado para filtros futuros.
}

message ListChunksResponse {
  // Chunks armazenados neste nó.
  repeated string chunk_ids = 1;
}